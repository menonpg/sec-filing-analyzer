# SEC Filing Analyzer - Dify Stack
# Deploy on Railway or any Docker host

version: '3.8'

services:
  # Dify API Backend
  api:
    image: langgenius/dify-api:latest
    restart: always
    environment:
      # App Mode
      MODE: api
      LOG_LEVEL: INFO
      
      # Secret key (generate with: openssl rand -base64 42)
      SECRET_KEY: ${SECRET_KEY:-sk-change-me-in-production}
      
      # Database (Railway Postgres or external)
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-dify}
      
      # Redis (Upstash or Railway Redis)
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_USE_SSL: ${REDIS_USE_SSL:-false}
      
      # Vector Store - Qdrant Cloud
      VECTOR_STORE: qdrant
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_CLIENT_TIMEOUT: 20
      
      # LLM Providers
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_API_BASE: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_API_VERSION: 2024-02-15-preview
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      
      # Storage (local for Railway, can switch to S3)
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
      
      # Web URL (set after Railway deploy)
      WEB_API_CORS_ALLOW_ORIGINS: ${CORS_ORIGINS:-*}
      CONSOLE_WEB_URL: ${CONSOLE_WEB_URL:-}
      SERVICE_API_URL: ${SERVICE_API_URL:-}
      APP_WEB_URL: ${APP_WEB_URL:-}
      
    volumes:
      - dify_storage:/app/api/storage
    depends_on:
      - db
      - redis
    ports:
      - "5001:5001"

  # Dify Worker (background jobs)
  worker:
    image: langgenius/dify-api:latest
    restart: always
    environment:
      MODE: worker
      LOG_LEVEL: INFO
      SECRET_KEY: ${SECRET_KEY:-sk-change-me-in-production}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-dify}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_USE_SSL: ${REDIS_USE_SSL:-false}
      VECTOR_STORE: qdrant
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_API_BASE: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_API_VERSION: 2024-02-15-preview
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
    volumes:
      - dify_storage:/app/api/storage
    depends_on:
      - db
      - redis

  # Dify Web Frontend
  web:
    image: langgenius/dify-web:latest
    restart: always
    environment:
      CONSOLE_API_URL: ${CONSOLE_API_URL:-}
      APP_API_URL: ${APP_API_URL:-}
      SENTRY_DSN: ""
    ports:
      - "3000:3000"
    depends_on:
      - api

  # PostgreSQL (can be replaced with Railway Postgres)
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-dify}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (can be replaced with Upstash)
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dify_storage:
  postgres_data:
  redis_data:
